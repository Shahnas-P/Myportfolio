<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon4.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Fonts Preconnect and Asynchronous Stylesheets (Non-blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />
  </noscript>

  <!-- Preloader CSS (Placed in head to paint immediately on Safari) -->
  <style>
    .initial-preloader {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #0b0f19;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999999;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .preloader-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100px;
      height: 100px;
    }

    .preloader-spinner {
      width: 64px;
      height: 64px;
      border: 3px solid transparent;
      border-top-color: #14b8a6;
      border-bottom-color: #6366f1;
      border-radius: 50%;
      animation: preloader-spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      z-index: 2;
    }

    .preloader-glow {
      position: absolute;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(20, 184, 166, 0.4) 0%, transparent 70%);
      animation: preloader-pulse 2s ease-in-out infinite alternate;
      z-index: 1;
    }

    .preloader-text {
      margin-top: 24px;
      color: #f3f4f6;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.8;
      animation: preloader-fade-glow 1.5s ease-in-out infinite alternate;
    }

    @keyframes preloader-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes preloader-pulse {
      0% { transform: scale(0.8); opacity: 0.3; }
      100% { transform: scale(1.3); opacity: 0.9; }
    }

    @keyframes preloader-fade-glow {
      0% { opacity: 0.4; }
      100% { opacity: 1; text-shadow: 0 0 10px rgba(20, 184, 166, 0.5); }
    }
  </style>

  <!-- Primary SEO Meta Tags -->
  <title>Shahnas Dev | Full Stack Engineer </title>
  <meta name="description"
    content="Explore the developer portfolio of Shahnas Dev, a Senior Full Stack Engineer specializing in building modern React, Next.js, and Node.js applications with stunning designs." />
  <meta name="keywords"
    content="Shahnas Dev, Full Stack Developer, React Engineer, Web Developer Portfolio, Next.js, TypeScript, Front-end Developer" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Shahnas Dev | Full Stack Engineer Portfolio" />
  <meta property="og:description"
    content="Explore the developer portfolio of Shahnas Dev, specializing in high-performance web applications." />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="Shahnas Dev | Full Stack Engineer Portfolio" />
  <meta property="twitter:description"
    content="Explore the developer portfolio of Shahnas Dev, specializing in high-performance web applications." />
</head>

<body>
  <div id="root">
    <!-- Premium Preloader (cleared automatically when React mounts) -->
    <div class="initial-preloader">
      <div class="preloader-container">
        <div class="preloader-glow"></div>
        <div class="preloader-spinner"></div>
      </div>
      <div class="preloader-text">Loading Portal</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
