<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Google Fonts Preconnect and Stylesheets -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Primary SEO Meta Tags -->
  <title>Shahnas Dev | Full Stack Engineer </title>
  <meta name="description"
    content="Explore the developer portfolio of Shahnas Dev, a Senior Full Stack Engineer specializing in building modern React, Next.js, and Node.js applications with stunning designs." />
  <meta name="keywords"
    content="Shahnas Dev, Full Stack Developer, React Engineer, Web Developer Portfolio, Next.js, TypeScript, Front-end Developer" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Shahnas Dev | Full Stack Engineer Portfolio" />

    content="Explore the developer portfolio of Shahnas Dev, specializing in high-performance web applications." />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="Shahnas Dev | Full Stack Engineer Portfolio" />
  <meta property="twitter:description"
    content="Explore the developer portfolio of Shahnas Dev, specializing in high-performance web applications." />
</head>

<body>
  <div id="root">
    <!-- Premium Preloader (cleared automatically when React mounts) -->
    <style>
      .initial-preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0b0f19;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 999999;
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      }

      .preloader-glow-ring {
        position: relative;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1 0%, #14b8a6 50%, #a855f7 100%);
        animation: spin-pulse 2s linear infinite;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Inner glass ring to create the stroke look */
      .preloader-glow-ring::after {
        content: '';
        position: absolute;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background-color: #0b0f19;
      }

      .preloader-inner-dot {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background-color: #14b8a6;
        box-shadow: 0 0 15px #14b8a6, 0 0 30px #14b8a6;
        animation: orbit 1.5s ease-in-out infinite;
        z-index: 2;
      }

      .preloader-text {
        margin-top: 28px;
        color: #f3f4f6;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        opacity: 0.8;
        animation: fade-glow 1.5s ease-in-out infinite alternate;
      }

      @keyframes spin-pulse {
        0% {
          transform: rotate(0deg) scale(1);
          box-shadow: 0 0 20px rgba(99, 102, 241, 0.2), 0 0 40px rgba(168, 85, 247, 0.1);
        }

        50% {
          transform: rotate(180deg) scale(1.04);
          box-shadow: 0 0 30px rgba(20, 184, 166, 0.4), 0 0 60px rgba(99, 102, 241, 0.2);
        }

        100% {
          transform: rotate(360deg) scale(1);
          box-shadow: 0 0 20px rgba(99, 102, 241, 0.2), 0 0 40px rgba(168, 85, 247, 0.1);
        }
      }

      @keyframes orbit {
        0% {
          transform: rotate(0deg) translateX(36px) rotate(0deg);
        }

        100% {
          transform: rotate(360deg) translateX(36px) rotate(-360deg);
        }
      }

      @keyframes fade-glow {
        0% {
          opacity: 0.4;
          text-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
        }

        100% {
          opacity: 0.95;
          text-shadow: 0 0 15px rgba(20, 184, 166, 0.6);
        }
      }
    </style>
    <div class="initial-preloader">
      <div class="preloader-glow-ring">
        <div class="preloader-inner-dot"></div>
      </div>
      <div class="preloader-text">Loading Portal</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
