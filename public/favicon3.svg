<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>

    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Glow -->
  <circle cx="128" cy="128" r="96" fill="#3B82F6" opacity="0.15"/>

  <!-- Earth -->
  <circle
    cx="128"
    cy="128"
    r="88"
    fill="url(#ocean)"
    filter="url(#glow)"
  />

  <!-- Continents -->
  <path
    d="M90 85 C75 90 65 105 70 120 C78 138 95 145 105 135 C115 125 120 105 110 92 Z"
    fill="url(#land)"
  />

  <path
    d="M150 95 C170 85 190 100 188 120 C185 145 165 150 150 140 C140 130 138 110 150 95 Z"
    fill="url(#land)"
  />

  <path
    d="M110 155 C125 145 145 150 150 165 C155 180 140 192 122 188 C105 184 98 168 110 155 Z"
    fill="url(#land)"
  />

  <!-- Latitude lines -->
  <ellipse
    cx="128"
    cy="128"
    rx="88"
    ry="30"
    stroke="white"
    stroke-opacity="0.25"
    stroke-width="2"
    fill="none"
  />

  <ellipse
    cx="128"
    cy="128"
    rx="88"
    ry="55"
    stroke="white"
    stroke-opacity="0.2"
    stroke-width="2"
    fill="none"
  />

  <!-- Longitude -->
  <ellipse
    cx="128"
    cy="128"
    rx="30"
    ry="88"
    stroke="white"
    stroke-opacity="0.2"
    stroke-width="2"
    fill="none"
  />

  <ellipse
    cx="128"
    cy="128"
    rx="55"
    ry="88"
    stroke="white"
    stroke-opacity="0.2"
    stroke-width="2"
    fill="none"
  />
</svg>